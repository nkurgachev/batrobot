services:
  fix-permissions:
    image: alpine:3.20
    container_name: batrobot-fix-permissions
    user: "0:0"
    command: >
      sh -lc "mkdir -p /app/data &&
              chown -R 1000:1000 /app/data &&
              find /app/data -type d -exec chmod 775 {} \; &&
              find /app/data -type f -exec chmod 664 {} \;"
    volumes:
      - ./data:/app/data
    restart: "no"

  batrobot:
    image: ${BATROBOT_IMAGE}
    container_name: batrobot
    init: true
    restart: unless-stopped
    depends_on:
      fix-permissions:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DAY_START_HOUR: ${DAY_START_HOUR:-3}
      DAY_TIMEZONE: ${DAY_TIMEZONE:-Europe/Moscow}
      INGESTION_STRATZ_HISTORICAL_START: ${INGESTION_STRATZ_HISTORICAL_START:-1767225600}
      INGESTION_STRATZ_MATCHES_LIMIT: ${INGESTION_STRATZ_MATCHES_LIMIT:-20}
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=70.0 -XX:InitialRAMPercentage=20.0 -Dfile.encoding=UTF-8}
    volumes:
      - ./data:/app/data
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

server:
  port: 8081

spring:
  profiles:
    default: local
  h2:
    console:
      enabled: false
      path: /h2-console
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/batrobot-db}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    clean-disabled: true
    locations: classpath:db/migration
  web:
    locale: ru

logging:
  level:
    org.hibernate: WARN

app:
  day:
    # Hour when the day starts for match queries (0-23). Default: 3 (03:00)
    start-hour: ${DAY_START_HOUR:3}
    # Timezone for day calculations. Default: Europe/Moscow
    timezone: ${DAY_TIMEZONE:Europe/Moscow}
  reputation:
    fixed-reputations:
      filimonovk: 52
      nkurgachev: -52

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
    username: ${TELEGRAM_BOT_USERNAME:}
  locale:
    overrides:
      multi_paska: fi

stratz:
  api:
    base-url: ${STRATZ_API_BASE_URL:https://api.stratz.com}
    token: ${STRATZ_API_TOKEN:}

ingestion:
  stratz:
    scheduler:
      # Cron для обновления данных. По умолчанию: каждые 5 минут
      match-update-cron: "0 */3 * * * ?"
      # Cron для обновления профилей игроков. По умолчанию: каждые 30 мин
      player-update-cron: "0 */3 * * * ?"
    sync:
      # Историческая дата начала загрузки матчей (Unix timestamp в секундах)
      # По умолчанию: 1 января 2026 00:00:00 UTC (1767225600)
      historical-start-timestamp: ${INGESTION_STRATZ_HISTORICAL_START:1767225600}
      # Лимит матчей на одного игрока в одном запросе
      matches-limit: ${INGESTION_STRATZ_MATCHES_LIMIT:20}

steam:
  api:
    token: ${STEAM_API_TOKEN:}

resilience4j:
  ratelimiter:
    instances:
      # ===================== Steam API =====================
      steam-api:
        # Steam API batch requests: 1 request per second
        limitForPeriod: 1
        limitRefreshPeriod: 1s
        timeoutDuration: 5s
        registerHealthIndicator: true
        eventConsumerBufferSize: 10

      # ===================== Stratz API =====================
      stratz-api:
        # Stratz API limits: 20 RPS, 250 RPM, 2000 RPH, 10000 RPD
        # Setting conservative limit: 6 requests per minute (10 seconds per request)
        limitForPeriod: 6
        limitRefreshPeriod: 60s
        timeoutDuration: 0
        registerHealthIndicator: true
        eventConsumerBufferSize: 10